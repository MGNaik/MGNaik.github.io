title: "SETPOINT"
name: "Meetkumar Naik"
email: "meetkumarnaik@gmail.com"
description: "Robotics | Control Theory | AI"
url: "https://MGNaik.github.io"
baseurl: ""
github_username: MGNaik
minimal_mistakes_skin: dirt
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Meetkumar Naik"
  avatar : "/assets/images/Headshot.jpg"
  bio: "Mechatronics engineer building things that move. This is where I document the thinking behind the work"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MGNaik"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://au.linkedin.com/in/mkn100"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MGNaik"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://au.linkedin.com/in/mkn100"
      
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
