title: "SETPOINT"
name: "Meetkumar Naik"
email: "meetkumarnaik@gmail.com"
description: "Robotics | Control Theory | AI"
url: "https://MGNaik.github.io"
baseurl: ""
github_username: MGNaik

# Build
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
paginate: 6
paginate_path: /page:num/
timezone: Australia/Perth

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji

# Default layout for posts (so post files need no `layout:` line)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Author rail
author:
  name: "Meetkumar Naik"
  avatar: "/assets/images/Headshot.jpg"
  bio: "Mechatronics engineer building things that move. This is where I document the thinking behind the work."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MGNaik"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://au.linkedin.com/in/mkn100"

# Footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MGNaik"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://au.linkedin.com/in/mkn100"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
