---
title: "All posts"
permalink: /posts/
layout: default
---
<div class="shell">
  <header class="page-head">
    <h1 class="page-head__title">All writing</h1>
    <p class="page-head__sub">{{ site.posts | size }} posts</p>
  </header>
  <div class="cards">
    {% for post in site.posts %}
      {% include post-card.html post=post %}
    {% endfor %}
  </div>
</div>
