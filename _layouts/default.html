<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.description }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/setpoint.css' | relative_url }}">
</head>
<body>
  {% include masthead.html %}
  <main class="main">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll('a[href^="http"]').forEach(function (a) {
        if (a.host !== location.host) { a.target = "_blank"; a.rel = "noopener noreferrer"; }
      });
    });
  </script>
</body>
</html>
